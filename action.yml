name: 'Bump (retired)'
description: 'Retired. Use Changesets and SylphxAI/.github/.github/workflows/release.yml@main instead.'

inputs:
  github-token:
    description: 'Unused; retained only so old workflow YAML fails with a clear retirement message.'
    required: false
  npm-token:
    description: 'Unused; retained only so old workflow YAML fails with a clear retirement message.'
    required: false
  mode:
    description: 'Unused; Bump is retired.'
    required: false
    default: 'auto'
  dry-run:
    description: 'Unused; Bump is retired.'
    required: false
    default: 'false'
  base-branch:
    description: 'Unused; Bump is retired.'
    required: false
    default: 'main'
  working-directory:
    description: 'Unused; Bump is retired.'
    required: false
    default: '.'
  skip-install:
    description: 'Unused; Bump is retired.'
    required: false
    default: 'false'
  cli-path:
    description: 'Unused; Bump is retired.'
    required: false
    default: 'bump'

outputs:
  published:
    description: 'Always false because Bump is retired.'
    value: 'false'
  versions:
    description: 'Always empty because Bump is retired.'
    value: '{}'

runs:
  using: 'composite'
  steps:
    - name: Fail because Bump is retired
      shell: bash
      run: |
        cat >&2 <<'MSG'
        @sylphx/bump is retired.

        Use Changesets for release intent/version PRs and the central Sylphx release workflow:
          uses: SylphxAI/.github/.github/workflows/release.yml@main

        Do not add new Bump consumers or semantic-commit auto-bump release paths.
        MSG
        exit 1
